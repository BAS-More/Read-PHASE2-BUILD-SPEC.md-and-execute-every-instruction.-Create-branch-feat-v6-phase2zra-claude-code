<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">EZRA logo</title>
  <desc id="desc">A simple feather quill writing across a Torah scroll inside an ink-blue seal, representing Ezra the scribe.</desc>
  <defs>
    <linearGradient id="bg" x1="108" y1="84" x2="408" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27425a"/>
      <stop offset="1" stop-color="#101922"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(256 176) rotate(90) scale(172)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b6b89" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#4b6b89" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bronze" x1="112" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9be7a"/>
      <stop offset="0.5" stop-color="#b38a4c"/>
      <stop offset="1" stop-color="#7c5928"/>
    </linearGradient>
    <linearGradient id="parchment" x1="176" y1="126" x2="336" y2="362" gradientUnits="userSpaceOnUse">
