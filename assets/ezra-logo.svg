<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">EZRA logo</title>
  <desc id="desc">A stylized quill and parchment scroll with Hebrew lettering and a Magen David inside an ink-blue seal, representing Ezra the scribe.</desc>
  <defs>
    <linearGradient id="bg" x1="108" y1="84" x2="408" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27425a"/>
      <stop offset="1" stop-color="#101922"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(256 184) rotate(90) scale(170)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b6b89" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4b6b89" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bronze" x1="112" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9be7a"/>
      <stop offset="0.5" stop-color="#b38a4c"/>
      <stop offset="1" stop-color="#7c5928"/>
    </linearGradient>
    <linearGradient id="parchment" x1="136" y1="148" x2="388" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbf2d7"/>
      <stop offset="0.5" stop-color="#ead7ab"/>
      <stop offset="1" stop-color="#d4b77a"/>
    </linearGradient>
    <linearGradient id="feather" x1="238" y1="128" x2="386" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f0df"/>
      <stop offset="1" stop-color="#d6c6a2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#091018" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="228" fill="url(#bg)"/>
    <circle cx="256" cy="256" r="228" fill="none" stroke="url(#bronze)" stroke-width="12"/>
    <circle cx="256" cy="256" r="198" fill="none" stroke="#7b6135" stroke-opacity="0.45" stroke-width="4"/>
  </g>

  <circle cx="256" cy="184" r="150" fill="url(#glow)"/>

  <circle cx="256" cy="106" r="26" fill="#162535" stroke="url(#bronze)" stroke-width="6"/>
  <path d="M256 86 L273 116 H239 Z" fill="none" stroke="#e4c87f" stroke-width="5" stroke-linejoin="round"/>
  <path d="M256 126 L239 96 H273 Z" fill="none" stroke="#e4c87f" stroke-width="5" stroke-linejoin="round"/>

  <ellipse cx="152" cy="244" rx="34" ry="72" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>
  <ellipse cx="360" cy="244" rx="34" ry="72" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>
  <ellipse cx="152" cy="244" rx="14" ry="34" fill="none" stroke="#9b7a45" stroke-width="6" opacity="0.8"/>
  <ellipse cx="360" cy="244" rx="14" ry="34" fill="none" stroke="#9b7a45" stroke-width="6" opacity="0.8"/>

