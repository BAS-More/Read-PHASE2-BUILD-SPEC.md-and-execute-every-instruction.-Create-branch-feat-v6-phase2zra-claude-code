  <path d="M182 364 L193 382" fill="none" stroke="#5b4020" stroke-width="4" stroke-linecap="round"/>

  <path d="M200 316 C220 328 241 331 265 327" fill="none" stroke="#6b4f2a" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
