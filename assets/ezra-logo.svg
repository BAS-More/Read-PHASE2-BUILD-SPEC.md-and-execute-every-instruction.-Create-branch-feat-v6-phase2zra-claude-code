      <stop offset="1" stop-color="#d8c7a2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#091018" flood-opacity="0.28"/>
    </filter>
  </defs>

