    </linearGradient>
    <linearGradient id="feather" x1="238" y1="128" x2="386" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f0df"/>
      <stop offset="1" stop-color="#d6c6a2"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="228" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#bronze)" stroke-width="12"/>
  <circle cx="256" cy="256" r="198" fill="none" stroke="#7b6135" stroke-opacity="0.45" stroke-width="4"/>

  <path d="M154 148 C154 118 176 100 206 100 C236 100 252 118 252 148 V258 H154 Z" fill="url(#stone)" stroke="#7d858f" stroke-width="8"/>
  <path d="M260 148 C260 118 276 100 306 100 C336 100 358 118 358 148 V258 H260 Z" fill="url(#stone)" stroke="#7d858f" stroke-width="8"/>
  <path d="M182 144 H222" fill="none" stroke="#8a9199" stroke-width="8" stroke-linecap="round"/>
  <path d="M182 174 H222" fill="none" stroke="#8a9199" stroke-width="8" stroke-linecap="round"/>
  <path d="M290 144 H330" fill="none" stroke="none"/>
  <path d="M290 144 H330" fill="none" stroke="#8a9199" stroke-width="8" stroke-linecap="round"/>
  <path d="M290 174 H330" fill="none" stroke="#8a9199" stroke-width="8" stroke-linecap="round"/>

  <ellipse cx="172" cy="274" rx="30" ry="64" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>
  <ellipse cx="338" cy="274" rx="30" ry="64" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>

  <path
    d="M174 204
