<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">EZRA logo concept: Scribe and Code</title>
  <desc id="desc">A quill and Hebrew scroll framed by code brackets inside a seal, combining Ezra the scribe with software craftsmanship.</desc>
  <defs>
    <linearGradient id="bg" x1="108" y1="84" x2="408" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27425a"/>
      <stop offset="1" stop-color="#101922"/>
    </linearGradient>
    <linearGradient id="bronze" x1="112" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9be7a"/>
      <stop offset="0.5" stop-color="#b38a4c"/>
      <stop offset="1" stop-color="#7c5928"/>
    </linearGradient>
    <linearGradient id="parchment" x1="136" y1="148" x2="388" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbf2d7"/>
      <stop offset="0.5" stop-color="#ead7ab"/>
      <stop offset="1" stop-color="#d4b77a"/>
    </linearGradient>
    <linearGradient id="feather" x1="238" y1="128" x2="386" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f0df"/>
      <stop offset="1" stop-color="#d6c6a2"/>
