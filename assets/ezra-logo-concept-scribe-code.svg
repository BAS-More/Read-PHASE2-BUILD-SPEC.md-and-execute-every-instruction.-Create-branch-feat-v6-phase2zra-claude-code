  <ellipse cx="152" cy="244" rx="34" ry="72" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>
  <ellipse cx="360" cy="244" rx="34" ry="72" fill="url(#parchment)" stroke="#8c6937" stroke-width="8"/>
  <ellipse cx="152" cy="244" rx="14" ry="34" fill="none" stroke="#9b7a45" stroke-width="6" opacity="0.8"/>
